name: CI Pipeline

on:
  push:
    branches: [develop]
    paths-ignore: ["**.md", "docs/**", ".gitignore"]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.7"

      - name: Sync dev environment
        run: uv sync --locked --extra dev

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Run pip-audit
        run: uv run pip-audit

      - name: Run mypy
        run: uv run mypy src/

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    needs: quality-gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.7"

      - name: Sync dev environment
        run: uv sync --locked --extra dev

      - name: Run unit tests
        run: uv run pytest tests/ -m "unit" -v --tb=short

  integration-tests:
    name: Integration Tests
    needs: unit-tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.7"

      - name: Sync dev environment
        run: uv sync --locked --extra dev

      - name: Run integration tests
        env:
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest tests/ -m "integration" -v --tb=short
