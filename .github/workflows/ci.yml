name: CI Pipeline

on:
  push:
    branches: [ develop ]
    paths-ignore: [ '**.md', 'docs/**', '.gitignore' ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Quality Gate: Lint, Types & Security
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install Dev Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pre-commit (Ruff, Format, Bandit, Secrets)
        uses: pre-commit/action@v3.0.1

      - name: Run pip-audit
        run: pip install pip-audit && pip-audit

      - name: Run Mypy
        run: pip install mypy && mypy src/

  # 2. Unit Tests
  unit-tests:
    name: Unit Tests
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install All Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run Unit Tests
        run: pytest tests/ -m "unit" -v --tb=short

  # 3. Integration Tests (with Redis)
  integration-tests:
    name: Integration Tests
    needs: unit-tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install All Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run Integration Tests
        env:
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -m "integration" -v --tb=short
