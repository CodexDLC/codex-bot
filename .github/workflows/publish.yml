name: Publish to PyPI

on:
  push:
    tags:
      - 'v*' # Триггер на теги v1.0.0, v0.1.0-alpha и т.д.

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/codex-bot/
    permissions:
      id-token: write # Необходимо для Trusted Publishing
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # КРИТИЧНО! Чтобы hatch-vcs или динамическая версия видели теги

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine hatchling

      - name: Build sdist and wheel
        run: python -m build

      - name: Check artifacts
        # Проверяем метаданные и README перед отправкой
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          # По умолчанию ищет в dist/
