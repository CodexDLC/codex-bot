name: Deploy Docs

on:
  push:
    branches:
      - main
    # Запускаем деплой доков ТОЛЬКО если изменилось что-то из этого списка:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'src/**'       # Потому что mkdocstrings тянет документацию прямо из кода
      - 'pyproject.toml'

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Обязательно! Нужно для hatch-vcs и истории коммитов в MkDocs

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip' # Возвращаем кэш на базу

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs,all]"

      - name: Build and Deploy Docs
        run: mkdocs gh-deploy --force
